<header>
     
    <!-- Mid-Header -->
    <div class="full-layer-mid-header">
      <div class="container">
          <nav class="navbar navbar-expand-lg navbar-light bg-light">
              <div class="container-fluid">
                  <!-- Navbar toggler for small screens -->
                  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                      <span class="navbar-toggler-icon"></span>
                  </button>

                  <div class="collapse navbar-collapse w-100" id="navbarNav">
                      <div class="d-flex w-100 justify-content-between align-items-center">

                          <!-- Left: Welcome message -->
                          <div class="navbar-text">
                                {% if request.user.is_authenticated %}
                                    Welcome, {{ request.user.username }}
                                {% else %}
                                    Please Login
                                {% endif %}
                          </div>

                          <!-- Center: Navigation links -->
                          <ul class="navbar-nav mx-auto">
                              <li class="nav-item">
                                  <a class="nav-link" href="{% url 'product-list' %}">Products</a>
                              </li>
                              <li class="nav-item">
                                  <a class="nav-link" href="{% url 'user-cart' %}">Cart</a>
                              </li>
                              <li class="nav-item">
                                  <a class="nav-link" href="{% url 'orders' %}">Orders</a>
                              </li>
                          </ul>

                          <!-- Right: Logout -->
                          <div>
                                {% if request.user.is_authenticated %}
                                    <a class="nav-link text-danger" href="{% url 'user-logout' %}">Logout</a>
                                {% else %}
                                    <a class="nav-link text-danger" href="{% url 'user-login' %}">Login</a>
                                {% endif %}
                          </div>

                      </div>
                  </div>
              </div>
          </nav>
      </div>
    </div>

    <!-- Mid-Header /- -->

</header>
